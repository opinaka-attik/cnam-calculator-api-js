name: CI — Tests & Couverture

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # — Job 1 : Lint ————————————————————————————————————————
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4.2.2

      - name: Configuration de Node.js 22.x
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22.x"

      - name: Installation des dependances
        run: npm install

      - name: Analyse ESLint
        run: npm run lint

  # — Job 2 : Tests ————————————————————————————————————————
  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4.2.2

      - name: Configuration de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Installation des dependances
        run: npm install

      - name: Tests complets + couverture (--ci)
        run: npm run test:ci

      - name: Upload du rapport de couverture
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
