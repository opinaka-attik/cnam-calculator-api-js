name: CI — Tests & Couverture

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Job 1 : Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: 📷 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Configuration de Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🔍 Analyse ESLint
        run: npm run lint

  # ─── Job 2 : Tests ──────────────────────────────────────────────────────
  test:
    name: Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
      - name: 📷 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Configuration de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🧪 Tests unitaires
        run: npm run test:unit

      - name: 🔗 Tests d'intégration
        run: npm run test:integration

      - name: 📊 Couverture complète (unit + intégration)
        run: npm run test:coverage

      - name: ⬆️ Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 30
        if: matrix.node-version == '20.x'
