name: CI — Tests & Couverture

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
      - name: 📷 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Configuration de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🧪 Exécution des tests unitaires
        run: npm run test:unit

      - name: 🔗 Exécution des tests d'intégration
        run: npm run test:integration

      - name: 📊 Génération du rapport de couverture
        run: npm run test:coverage

      - name: ⬆️ Upload du rapport de couverture (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7
        if: matrix.node-version == '20.x'
